name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: pyproject.toml
      - name: Install
        run: python -m pip install -e ".[dev]"
      - name: Ruff
        run: python -m ruff check src tests
      - name: Mypy (strict)
        run: python -m mypy src/cortex_memory_budget

  unit:
    name: Unit tests (py${{ matrix.python }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ['3.11', '3.12']
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: ${{ matrix.python }}
          cache: 'pip'
          cache-dependency-path: pyproject.toml
      - name: Install
        run: python -m pip install -e ".[dev]"
      - name: Unit tests
        run: python -m pytest tests/unit -v

  integration:
    name: Integration tests (real ARM toolchain)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: pyproject.toml
      - name: Install ARM toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends gcc-arm-none-eabi
          arm-none-eabi-gcc --version | head -1
      - name: Install package
        run: python -m pip install -e ".[dev]"
      - name: Integration tests
        run: python -m pytest tests/integration -v

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: pyproject.toml
      - name: Install ARM toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends gcc-arm-none-eabi
      - name: Install package
        run: python -m pip install -e ".[dev]"
      - name: Run tests with coverage
        run: |
          python -m pytest --cov --cov-report=xml --cov-report=term
      - name: Upload coverage
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v5.0.0
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: error

  action-smoke:
    name: Action smoke test (Cortex-${{ matrix.cortex }})
    runs-on: ubuntu-latest
    needs: [lint, unit]
    permissions:
      contents: read
      pull-requests: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - cortex: m4
            example: minimal
          - cortex: m7
            example: cortex-m7
          - cortex: m33
            example: cortex-m33
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: Install ARM toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends gcc-arm-none-eabi
      - name: Rebuild example ELF
        working-directory: examples/${{ matrix.example }}
        run: |
          case "${{ matrix.cortex }}" in
            m0)  FLAGS="-mcpu=cortex-m0  -mthumb" ;;
            m4)  FLAGS="-mcpu=cortex-m4  -mthumb" ;;
            m7)  FLAGS="-mcpu=cortex-m7  -mthumb -mfpu=fpv5-d16 -mfloat-abi=hard" ;;
            m33) FLAGS="-mcpu=cortex-m33 -mthumb" ;;
          esac
          arm-none-eabi-gcc $FLAGS -Os -g -nostdlib -ffreestanding \
            -T link.ld -o firmware.elf main.c
      - name: Run composite action
        id: mem
        uses: ./
        with:
          config-path: examples/${{ matrix.example }}/memory-analysis.json
          elf-path: examples/${{ matrix.example }}/firmware.elf
          target: ci-smoke-${{ matrix.cortex }}
          build-config: Release
          cortex: ${{ matrix.cortex }}
          linker-script-path: examples/${{ matrix.example }}/link.ld
          output-dir: smoke-out-${{ matrix.cortex }}
          package-version: ' @ git+file://${{ github.workspace }}'
          post-comment: 'false'
          artifact-name: smoke-${{ matrix.cortex }}
      - name: Verify outputs
        run: |
          test -f smoke-out-${{ matrix.cortex }}/memory_metrics.json
          test -f smoke-out-${{ matrix.cortex }}/pr_comment.md
          test -f smoke-out-${{ matrix.cortex }}/memory_report.md
          echo "flash-bytes=${{ steps.mem.outputs.flash-bytes }}"
          echo "ram-bytes=${{ steps.mem.outputs.ram-bytes }}"
          test "${{ steps.mem.outputs.flash-bytes }}" -gt 0
