name: Memory Analysis (reusable)

# Reusable workflow that wraps the composite ./action so consumers can call it
# with `uses: embedded-pro/cortex-memory-budget/.github/workflows/memory-analysis.yml@<ref>`.
#
# Build the ELF in a job that uploads it as an artifact named `elf-artifact`
# (configurable), then call this workflow. To enable diff mode also upload a
# baseline ELF artifact.

on:
  workflow_call:
    inputs:
      config-path:
        description: 'Path to the memory-analysis JSON config file (in the consumer repo).'
        required: true
        type: string
      elf-artifact-name:
        description: 'Artifact name containing the current ELF.'
        required: true
        type: string
      elf-path:
        description: 'Path to the ELF inside the downloaded artifact.'
        required: true
        type: string
      baseline-elf-artifact-name:
        description: 'Optional artifact name containing the baseline ELF.'
        required: false
        type: string
        default: ''
      baseline-elf-path:
        description: 'Path to the baseline ELF inside its artifact.'
        required: false
        type: string
        default: ''
      target:
        required: true
        type: string
      build-config:
        required: true
        type: string
      cortex:
        required: false
        type: string
        default: 'm4'
      linker-script-path:
        required: false
        type: string
        default: ''
      fail-over-flash-pct:
        required: false
        type: string
        default: ''
      fail-over-ram-pct:
        required: false
        type: string
        default: ''
      python-version:
        required: false
        type: string
        default: '3.11'
      package-version:
        required: false
        type: string
        default: ''
      runs-on:
        required: false
        type: string
        default: 'ubuntu-latest'

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  memory-analysis:
    runs-on: ${{ inputs.runs-on }}
    steps:
      - name: Checkout consumer repo
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Download current ELF artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: ${{ inputs.elf-artifact-name }}
          path: elf

      - name: Download baseline ELF artifact
        if: ${{ inputs.baseline-elf-artifact-name != '' }}
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: ${{ inputs.baseline-elf-artifact-name }}
          path: baseline-elf

      - name: Run memory analysis
        uses: embedded-pro/cortex-memory-budget@v0  # pinned tag; or use a SHA
        with:
          config-path: ${{ inputs.config-path }}
          elf-path: elf/${{ inputs.elf-path }}
          baseline-elf-path: ${{ inputs.baseline-elf-artifact-name == '' && '' || format('baseline-elf/{0}', inputs.baseline-elf-path) }}
          target: ${{ inputs.target }}
          build-config: ${{ inputs.build-config }}
          cortex: ${{ inputs.cortex }}
          linker-script-path: ${{ inputs.linker-script-path }}
          fail-over-flash-pct: ${{ inputs.fail-over-flash-pct }}
          fail-over-ram-pct: ${{ inputs.fail-over-ram-pct }}
          python-version: ${{ inputs.python-version }}
          package-version: ${{ inputs.package-version }}
